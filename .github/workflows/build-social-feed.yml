name: Build Social Feed

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'social-feed/**'
  pull_request:
    paths:
      - 'social-feed/**'
  release:
    types:
      - published

jobs:
  test-e2e:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: social-feed/tests/e2e

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Run e2e tests
        run: npm test
        env:
          CI: true

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: social-feed-playwright-report
          path: social-feed/tests/e2e/playwright-report/
          retention-days: 7

  build:
    runs-on: ubuntu-latest
    needs: test-e2e

    defaults:
      run:
        working-directory: social-feed

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'
          tools: composer:v2

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader

      - name: Run PHPCS
        run: composer run phpcs || true

      - name: Run PHPStan
        run: composer run phpstan || true

      - name: Build plugin ZIP
        run: |
          PLUGIN_SLUG="social-feed"
          BUILD_DIR="${PLUGIN_SLUG}-build"
          mkdir -p "${BUILD_DIR}/${PLUGIN_SLUG}"
          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='tests' \
            --exclude='composer.json' \
            --exclude='composer.lock' \
            . "${BUILD_DIR}/${PLUGIN_SLUG}/"
          cd "${BUILD_DIR}"
          zip -r "../${PLUGIN_SLUG}.zip" "${PLUGIN_SLUG}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: social-feed
          path: social-feed/social-feed.zip
          retention-days: 7

      - name: Upload to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: social-feed/social-feed.zip
